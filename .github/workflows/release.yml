name: Auto Release — Version Bump + Docker Build & Push

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  bump-version:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      commit_sha: ${{ steps.bump.outputs.commit_sha }}
      release_notes: ${{ steps.bump.outputs.release_notes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version in settings.py
        id: bump
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          COMMIT_MSG=$(git log -1 --pretty=%B)
          CURRENT_VERSION=$(grep -E '^VERSION\s*=' backend/config/settings.py \
            | sed -E 's/.*"([^"]+)".*/\1/')

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

          if echo "$COMMIT_MSG" | grep -qiE '(^|[^a-z])BREAKING:'; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
            BUMP_KIND=major
          elif echo "$COMMIT_MSG" | grep -qiE '^feat(\(.*\))?:'; then
            MINOR=$((MINOR + 1)); PATCH=0
            BUMP_KIND=minor
          else
            PATCH=$((PATCH + 1))
            BUMP_KIND=patch
          fi

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "Bumping ${CURRENT_VERSION} → ${NEW_VERSION} (${BUMP_KIND})"

          sed -i -E "s/^VERSION\s*=.*$/VERSION = \"${NEW_VERSION}\"/" \
            backend/config/settings.py

          git add backend/config/settings.py
          git commit -m "chore: bump version to ${NEW_VERSION} [skip ci]"
          git tag "v${NEW_VERSION}"
          git push origin main
          git push origin "v${NEW_VERSION}"

          {
            echo "new_version=${NEW_VERSION}"
            echo "commit_sha=$(git rev-parse --short HEAD)"
            echo "release_notes<<EOF"
            echo "${COMMIT_MSG}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: bump-version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: django
            context: ./backend
            image: local-ai-django
          - service: nextjs
            context: ./frontend
            image: local-ai-nextjs
          - service: rag
            context: ./rag
            image: local-ai-rag
          - service: whisper
            context: ./whisper
            image: local-ai-whisper
          - service: ollama
            context: ./ollama
            image: local-ai-ollama
          - service: updater
            context: ./updater
            image: local-ai-updater
    steps:
      - name: Checkout (post-bump main)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ needs.bump-version.outputs.new_version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
          build-args: |
            APP_VERSION=${{ needs.bump-version.outputs.new_version }}
            COMMIT_SHA=${{ needs.bump-version.outputs.commit_sha }}

  github-release:
    needs: [bump-version, build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.bump-version.outputs.new_version }}
          name: Release v${{ needs.bump-version.outputs.new_version }}
          body: |
            ## Release v${{ needs.bump-version.outputs.new_version }}

            **Changes:**
            ${{ needs.bump-version.outputs.release_notes }}

            **Pull images:**
            ```
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/local-ai-django:${{ needs.bump-version.outputs.new_version }}
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/local-ai-nextjs:${{ needs.bump-version.outputs.new_version }}
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/local-ai-rag:${{ needs.bump-version.outputs.new_version }}
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/local-ai-whisper:${{ needs.bump-version.outputs.new_version }}
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/local-ai-ollama:${{ needs.bump-version.outputs.new_version }}
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/local-ai-updater:${{ needs.bump-version.outputs.new_version }}
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
