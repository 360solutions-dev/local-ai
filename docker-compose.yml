services:
  caddy:
    image: caddy:2-alpine
    container_name: local-ai-caddy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      nextjs:
        condition: service_healthy
      django:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - local-ai-net

  postgres:
    image: postgres:16-alpine
    container_name: local-ai-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - local-ai-net

  ollama:
    image: ollama/ollama:latest
    container_name: local-ai-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama/entrypoint.sh:/entrypoint.sh
    entrypoint: ["/entrypoint.sh"]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - local-ai-net

  django:
    build: ./backend
    container_name: local-ai-django
    restart: unless-stopped
    # Run as root so the storage page can read /var/run/docker.sock for
    # per-project Docker stats. Acceptable for a local single-user app.
    user: "0"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG}
      ALLOWED_HOSTS: localhost,127.0.0.1,django,api.local-ai.localhost
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      RAG_SERVICE_URL: http://rag:8080
      RAG_API_KEY: ${RAG_API_KEY}
    volumes:
      - ./backend:/app
      # Read-only Docker socket so the storage page can report the project's
      # real Docker footprint via the Docker Engine API.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Use a public endpoint — /api/system/info/ requires auth and returns 401,
      # which urllib treats as HTTPError and the healthcheck fails even though
      # Django is healthy.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/auth/setup-status/')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - local-ai-net

  nextjs:
    build: ./frontend
    container_name: local-ai-nextjs
    restart: unless-stopped
    # Override Dockerfile USER so the container can write to the anonymous
    # /app/.next and /app/node_modules volumes (Docker creates them root-owned,
    # which causes Turbopack EACCES on .next/dev mkdir for the image's appuser).
    user: "0"
    environment:
      BACKEND_URL: http://django:8000
      RAG_URL: http://rag:8080
      RAG_API_KEY: ${RAG_API_KEY}
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      django:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - local-ai-net

  rag:
    build: ./rag
    container_name: local-ai-rag
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      OLLAMA_BASE_URL: http://ollama:11434
      RAG_API_KEY: ${RAG_API_KEY}
    ports:
      - "8501:8501"
    volumes:
      - ./rag:/app
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      # The real health endpoint is /api/health (not /health).
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - local-ai-net

volumes:
  postgres_data:
  ollama_data:

networks:
  local-ai-net:
    driver: bridge
